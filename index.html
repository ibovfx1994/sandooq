<style>
:root{
  --bg:#050810;--bg2:#0a1322;--bg3:#0f1d35;
  --card:rgba(20,30,50,0.6);--card2:rgba(30,45,70,0.7);
  --bdr:rgba(16,185,129,0.15);--bdr2:rgba(255,255,255,0.08);
  --txt:#f0fdf4;--txt2:#a7f3d0;--txt3:#64748b;
  --emerald:#10b981;--teal:#14b8a6;--gold:#fbbf24;
  --red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --grad-em:linear-gradient(135deg,#10b981 0%,#14b8a6 100%);
  --grad-gold:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%);
  --grad-red:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);
  --grad-blue:linear-gradient(135deg,#3b82f6 0%,#6366f1 100%);
  --grad-purple:linear-gradient(135deg,#a855f7 0%,#8b5cf6 100%);
  --r:14px;--r2:18px;--r3:24px;
  --sh:0 8px 32px rgba(0,0,0,0.4);
  --sh-em:0 8px 24px rgba(16,185,129,0.3);
  --sh-gold:0 8px 24px rgba(251,191,36,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(circle at 10% 0%,rgba(16,185,129,0.15),transparent 40%),
    radial-gradient(circle at 90% 100%,rgba(20,184,166,0.12),transparent 40%),
    radial-gradient(circle at 50% 50%,rgba(251,191,36,0.05),transparent 50%),
    var(--bg);
}

/* ===== FLOATING PARTICLES ===== */
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:0.6}
  90%{opacity:0.2}
  100%{transform:translateY(-10vh) scale(1.5);opacity:0}
}

/* ===== ANIMATED BACKGROUND ORBS ===== */
.orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;animation:orbFloat ease-in-out infinite}
.orb1{width:300px;height:300px;background:radial-gradient(circle,rgba(16,185,129,0.12),transparent);top:-100px;right:-100px;animation-duration:8s}
.orb2{width:250px;height:250px;background:radial-gradient(circle,rgba(251,191,36,0.08),transparent);bottom:-80px;left:-80px;animation-duration:10s;animation-delay:-3s}
.orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(59,130,246,0.07),transparent);top:40%;right:-60px;animation-duration:12s;animation-delay:-6s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(-20px,15px) scale(1.05)}
  66%{transform:translate(15px,-10px) scale(0.95)}
}

input,button,select,textarea{font-family:inherit;outline:none;border:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

.app{max-width:480px;margin:0 auto;padding:16px 14px 100px;min-height:100vh;position:relative;z-index:1}

/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding:4px;animation:slideDown 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--grad-em);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--sh-em);animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:var(--sh-em)}50%{box-shadow:0 8px 32px rgba(16,185,129,0.6)}}
.hdr-t{font-size:18px;font-weight:800}
.hdr-s{font-size:11px;color:var(--txt3)}
.hdr-r{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(10px);position:relative;transition:all 0.2s}
.icon-btn:active{transform:scale(0.88) rotate(-5deg)}
.icon-btn .badge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;animation:badgeBounce 2s ease-in-out infinite}
@keyframes badgeBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* Balance hero */
.hero{background:var(--grad-em);border-radius:var(--r3);padding:20px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:var(--sh-em);animation:heroEntrance 0.6s cubic-bezier(.34,1.56,.64,1) 0.1s both}
@keyframes heroEntrance{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,0.2),transparent);border-radius:50%;animation:heroOrb1 6s ease-in-out infinite}
.hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:150px;height:150px;background:radial-gradient(circle,rgba(251,191,36,0.2),transparent);border-radius:50%;animation:heroOrb2 8s ease-in-out infinite}
@keyframes heroOrb1{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,10px)}}
@keyframes heroOrb2{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-15px)}}
.hero-lbl{font-size:11px;color:rgba(255,255,255,0.85);font-weight:600;margin-bottom:6px;position:relative}
.hero-val{font-size:28px;font-weight:900;margin-bottom:4px;position:relative;letter-spacing:-0.5px;animation:countUp 0.8s ease-out}
@keyframes countUp{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.hero-sub{font-size:12px;color:rgba(255,255,255,0.8);position:relative}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;position:relative}
.hero-st{background:rgba(0,0,0,0.2);backdrop-filter:blur(10px);border-radius:12px;padding:10px;transition:all 0.2s}
.hero-st:active{transform:scale(0.96)}
.hero-st-l{font-size:10px;opacity:0.85;font-weight:600}
.hero-st-v{font-size:14px;font-weight:800;margin-top:2px}

/* Quick stats */
.qstats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.qst{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--bdr2);border-radius:var(--r2);padding:12px;position:relative;overflow:hidden;transition:all 0.2s}
.qst::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);pointer-events:none}
.qst:active{transform:scale(0.97)}
.qst-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:8px;animation:iconBounce 4s ease-in-out infinite}
@keyframes iconBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.qst-icon.gold{background:var(--grad-gold);box-shadow:var(--sh-gold)}
.qst-icon.red{background:var(--grad-red)}
.qst-icon.blue{background:var(--grad-blue)}
.qst-icon.purple{background:var(--grad-purple)}
.qst-l{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;margin-bottom:2px}
.qst-v{font-size:16px;font-weight:800}
.qst-d{font-size:10px;color:var(--txt3);margin-top:2px}
.qst-d.up{color:var(--emerald)}
.qst-d.dn{color:var(--red)}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;background:var(--card);padding:5px;border-radius:14px;border:1px solid var(--bdr2);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:fit-content;padding:9px 10px;border-radius:10px;font-size:12px;font-weight:700;color:var(--txt3);cursor:pointer;text-align:center;transition:all .25s;background:transparent;white-space:nowrap;position:relative;overflow:hidden}
.tab::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08);opacity:0;transition:opacity 0.2s}
.tab:active::after{opacity:1}
.tab.active{background:var(--grad-em);color:#fff;box-shadow:var(--sh-em);animation:tabActivate 0.3s cubic-bezier(.34,1.56,.64,1)}
@keyframes tabActivate{from{transform:scale(0.9)}to{transform:scale(1)}}

/* Sections */
.sec{display:none}
.sec.active{display:block;animation:secIn 0.35s cubic-bezier(.4,0,.2,1)}
@keyframes secIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--bdr2);border-radius:var(--r2);padding:14px;margin-bottom:12px;position:relative;overflow:hidden;transition:transform 0.15s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent)}
.card-t{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-t .ico{animation:icoSpin 8s linear infinite}
@keyframes icoSpin{0%,100%{transform:rotate(0deg)}25%{transform:rotate(5deg)}75%{transform:rotate(-5deg)}}

/* ===== SHIMMER ON NUMBERS ===== */
.shimmer-num{position:relative;overflow:hidden}
.shimmer-num::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);animation:shimmer 2.5s ease-in-out infinite}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* ===== PULSE RING ===== */
.pulse-ring{position:relative}
.pulse-ring::before{content:'';position:absolute;inset:-4px;border-radius:inherit;border:2px solid var(--emerald);opacity:0;animation:pulseRing 2.5s ease-out infinite}
@keyframes pulseRing{0%{opacity:0.6;transform:scale(1)}100%{opacity:0;transform:scale(1.3)}}

/* ===== STAT NUMBER ANIMATION ===== */
.stat-anim{transition:all 0.4s cubic-bezier(.4,0,.2,1)}
.stat-flash{animation:numFlash 0.4s ease}
@keyframes numFlash{0%{transform:scale(1.3);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}

/* ===== PROFIT CARD ANIMATIONS ===== */
.profit-card{transition:all 0.2s;position:relative;overflow:hidden}
.profit-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);pointer-events:none}
.profit-card:active{transform:scale(0.98)}

/* ===== PROGRESS BAR ANIMATION ===== */
@keyframes progressFill{from{width:0%}to{width:var(--target-w)}}
.prg-animated{animation:progressFill 1s cubic-bezier(.4,0,.2,1) forwards}

/* ===== CARD STAGGER ENTRANCE ===== */
.card-enter{animation:cardEnter 0.5s cubic-bezier(.34,1.2,.64,1) both}
@keyframes cardEnter{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== FLOATING NUMBERS ===== */
.float-profit{position:fixed;pointer-events:none;font-weight:900;font-size:16px;z-index:999;animation:floatProfit 1.5s ease-out forwards}
@keyframes floatProfit{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}

/* ===== GLOW PULSE ON HERO VAL ===== */
.hero-val{text-shadow:0 0 20px rgba(255,255,255,0.3);animation:valGlow 3s ease-in-out infinite}
@keyframes valGlow{0%,100%{text-shadow:0 0 20px rgba(255,255,255,0.2)}50%{text-shadow:0 0 30px rgba(255,255,255,0.5)}}

/* ===== RIPPLE EFFECT ===== */
.ripple{position:relative;overflow:hidden}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,0.25);transform:scale(0);animation:rippleAnim 0.5s ease-out;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}

/* ===== LIVE DOT ===== */
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);display:inline-block;margin-left:4px;animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.6}}

/* ===== SCROLL REVEAL ===== */
.reveal{opacity:0;transform:translateY(20px);transition:all 0.5s cubic-bezier(.4,0,.2,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.card-t .ico{width:28px;height:28px;border-radius:8px;background:var(--grad-em);display:flex;align-items:center;justify-content:center;font-size:13px}

/* Inputs */
.inp{width:100%;padding:11px 12px;background:rgba(0,0,0,0.3);border:1px solid var(--bdr2);border-radius:11px;color:var(--txt);font-size:13px;font-weight:600;transition:all .2s}
.inp:focus{border-color:var(--emerald);background:rgba(0,0,0,0.4)}
.inp::placeholder{color:var(--txt3)}
.lbl{font-size:11px;color:var(--txt2);font-weight:700;margin-bottom:5px;display:block}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

/* Buttons */
.btn{padding:12px 14px;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;width:100%}
.btn:active{transform:scale(0.97)}
.btn-em{background:var(--grad-em);color:#fff;box-shadow:var(--sh-em)}
.btn-gold{background:var(--grad-gold);color:#1a1a1a;box-shadow:var(--sh-gold)}
.btn-red{background:var(--grad-red);color:#fff}
.btn-blue{background:var(--grad-blue);color:#fff}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--txt);border:1px solid var(--bdr2)}
.btn-sm{padding:7px 11px;font-size:11px;border-radius:9px;width:auto}

/* Segments */
.seg{display:flex;background:rgba(0,0,0,0.3);border-radius:11px;padding:4px;gap:3px;margin-bottom:10px}
.seg-i{flex:1;padding:8px;font-size:11px;font-weight:700;color:var(--txt3);text-align:center;border-radius:8px;cursor:pointer;transition:all .2s}
.seg-i.active{background:var(--grad-em);color:#fff}
.seg-i.active.red{background:var(--grad-red)}
.seg-i.active.gold{background:var(--grad-gold);color:#1a1a1a}

/* List items */
.item{background:rgba(255,255,255,0.03);border:1px solid var(--bdr2);border-radius:13px;padding:11px;margin-bottom:8px;position:relative}
.item-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.item-name{font-size:13px;font-weight:800}
.item-meta{font-size:10px;color:var(--txt3);margin-top:2px}
.item-amt{font-size:14px;font-weight:800;text-align:left}
.item-amt.em{color:var(--emerald)}
.item-amt.red{color:var(--red)}
.item-amt.gold{color:var(--gold)}
.item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.item-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;margin-right:4px}
.tag-em{background:rgba(16,185,129,0.2);color:var(--emerald)}
.tag-red{background:rgba(239,68,68,0.2);color:var(--red)}
.tag-gold{background:rgba(251,191,36,0.2);color:var(--gold)}
.tag-blue{background:rgba(59,130,246,0.2);color:var(--blue)}

/* Progress */
.prg{background:rgba(0,0,0,0.4);height:7px;border-radius:5px;overflow:hidden;margin:6px 0}
.prg-f{height:100%;background:var(--grad-em);border-radius:5px;transition:width .5s}
.prg-f.gold{background:var(--grad-gold)}

/* Empty */
.empty{text-align:center;padding:30px 16px;color:var(--txt3)}
.empty-ico{font-size:42px;margin-bottom:10px;opacity:0.4}
.empty-t{font-size:13px;font-weight:700;margin-bottom:4px}
.empty-s{font-size:11px}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal-c{background:var(--bg2);border-top:1px solid var(--bdr);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:18px;max-height:88vh;overflow-y:auto;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideUp2{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-t{font-size:16px;font-weight:800}
.modal-x{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Notifications */
.notif-host{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;width:90%;max-width:420px;pointer-events:none}
.notif{background:var(--card2);backdrop-filter:blur(20px);border:1px solid var(--bdr);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;animation:notifIn .35s;box-shadow:var(--sh);pointer-events:auto}
